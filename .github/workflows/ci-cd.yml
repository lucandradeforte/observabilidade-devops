name: ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: observability-demo

jobs:
  catalog-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/catalog-service/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  orders-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore services/orders-service/OrdersService.slnx
      - run: dotnet build services/orders-service/OrdersService.slnx --configuration Release --no-restore
      - run: dotnet test services/orders-service/OrdersService.slnx --configuration Release --no-build

  build-images:
    runs-on: ubuntu-latest
    needs:
      - catalog-service
      - orders-service
    env:
      CATALOG_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-catalog-service
      ORDERS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-orders-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./services/catalog-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.CATALOG_IMAGE }}:${{ github.sha }}
            ${{ env.CATALOG_IMAGE }}:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./services/orders-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.ORDERS_IMAGE }}:${{ github.sha }}
            ${{ env.ORDERS_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG != ''
    env:
      CATALOG_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-catalog-service:${{ github.sha }}
      ORDERS_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}-orders-service:${{ github.sha }}
      NAMESPACE: ${{ env.NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy manifests
        run: bash ./scripts/deploy.sh

